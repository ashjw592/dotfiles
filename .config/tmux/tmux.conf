# ~/.tmux.conf

# ── Terminal ──────────────────────────────────
set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Cursor shape passthrough (beam/block from zsh → Ghostty)
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[6 q'

# ── General ───────────────────────────────────
set -g escape-time 10
set -g focus-events on
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Prefix: Ctrl-a ────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Vi copy mode ──────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Pane navigation (vim-style) ───────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Splits that keep the current path ─────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Status bar: off ───────────────────────────
# set -g status off

# ── Pane borders ──────────────────────────────
set -g pane-border-style        "fg=#504945"
set -g pane-active-border-style "fg=#d79921"

# ── Reload ────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "reloaded"

# ── Window Resizing ───────────────────────────
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# ── Plugins ───────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ── Powerline ─────────────────────────────────
set -g @plugin 'erikw/tmux-powerline'


# ── Power ─────────────────────────────────
set -g @plugin 'wfxr/tmux-power'
set -g @tmux_power_theme 'frappe'
# add this in power theme config
# frappe)     TC='#eebebe' ;;



# keep this at the bottom
run '~/.tmux/plugins/tpm/tpm'
