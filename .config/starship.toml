# ~/.config/starship.toml

add_newline = false

# Single line: directory → git → character
# (vi mode is handled by zsh cursor shape + tmux pill,
#  not duplicated here to keep the prompt clean)
format = "$directory$git_branch$git_status$character"



[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = " [$symbol$branch]($style)"
symbol = " "
style  = "bold purple"
truncation_length = 20

[git_status]
format = '([$all_status$ahead_behind]($style))'
style  = "bold red"
modified  = "~"
staged    = "+"
untracked = "?"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕"
deleted   = "✘"
stashed   = "≡$count"

[character]
success_symbol = " [❯](bold green)"
error_symbol   = " [❯](bold red)"
vimcmd_symbol  = " [❮](bold yellow)"

# Disable modules we don't need
[package]
disabled = true

[cmd_duration]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

